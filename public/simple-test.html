<!DOCTYPE html>
<html>
<head>
  <title>Simple Test</title>
</head>
<body>
  <h1>Simple Test</h1>
  <div id="result"></div>
  <script>
    fetch('/outputs/reports/reports-index.json')
      .then(r => r.json())
      .then(data => {
        document.getElementById('result').innerHTML = 'Reports: ' + data.reports.length
      })
      .catch(e => {
        document.getElementById('result').innerHTML = 'Error: ' + e.message
      })
  </script>
</body>
</html>
